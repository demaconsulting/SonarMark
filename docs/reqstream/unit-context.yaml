---
# SonarMark Context Requirements
#
# PURPOSE:
# - Define requirements for the Context software unit
# - Context parses command-line arguments and manages program output,
#   log-file redirection, enforcement mode, and results-file configuration
#
sections:
  - title: Context
    requirements:
      - id: SonarMark-Cmd-Silent
        title: The tool shall support silent mode to suppress console output.
        justification: |
          Silent mode is important for automated environments where console output may interfere with
          log parsing or where minimal output is preferred. It allows the tool to run without cluttering
          build logs while still performing its analysis and reporting functions.
        tests:
          - IntegrationTest_SilentFlag_SuppressesOutput

      - id: SonarMark-Cmd-Log
        title: The tool shall support writing output to a log file.
        justification: |
          Log file output enables persistent recording of tool execution for later review and audit trails.
          This is particularly valuable for debugging issues, maintaining compliance records, and analyzing
          trends in code quality over time without relying on transient console output.
        tests:
          - Context_Create_WithLogFile_WritesToLogFile

      - id: SonarMark-Cmd-Enforce
        title: The tool shall support enforcing quality gate checks.
        justification: |
          Quality gate enforcement allows the tool to fail builds when quality standards are not met,
          preventing low-quality code from progressing through the pipeline. This is a critical feature
          for maintaining code quality standards and preventing technical debt accumulation.
        tests:
          - Context_Create_EnforceFlag_SetsEnforceProperty

      - id: SonarMark-Enf-Mode
        title: The tool shall accept the --enforce flag and expose it for downstream processing.
        justification: |
          The Context unit is responsible for parsing command-line arguments and making them
          available to the rest of the program. Accepting --enforce and storing it as the Enforce
          property allows Program and other units to act on enforcement policy without coupling
          argument parsing to enforcement logic.
        tests:
          - Context_Create_EnforceFlag_SetsEnforceProperty
