---
# xUnit v3 OTS requirements
sections:
  - title: OTS Software Requirements
    sections:
      - title: xUnit v3 Requirements
        requirements:
          - id: SonarMark-OTS-XUnit
            title: xUnit v3 shall execute unit tests and report results.
            justification: |
              xUnit v3 (xunit.v3 and xunit.runner.visualstudio) is the unit-testing framework used
              by the project. It discovers and runs all test methods decorated with [Fact] or [Theory]
              and integrates with the .NET test runner to produce results that feed into coverage
              reporting and requirements traceability. Passing tests confirm the framework is
              functioning correctly.
            tags: [ots]
            tests:
              - Context_Create_WithLogFile_WritesToLogFile
              - Context_Create_ResultsFile_SetsResultsProperty
              - Context_Create_MissingResultsFilename_ThrowsException
              - Context_Create_EnforceFlag_SetsEnforceProperty
              - SonarQualityResult_ToMarkdown_Depth1_ProducesCorrectOutput
              - SonarQualityResult_ToMarkdown_WithIssues_ProducesCompilerStyleOutput
              - SonarQualityResult_ToMarkdown_WithHotSpots_ProducesCompilerStyleOutput
