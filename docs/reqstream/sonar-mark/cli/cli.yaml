---
# SonarMark Cli subsystem requirements
sections:
  - title: SonarMark Requirements
    sections:
      - title: Cli Requirements
        requirements:
          - id: SonarMark-Cli-Orchestrate
            title: The CLI subsystem shall parse command-line arguments and dispatch
              to the appropriate functionality.
            justification: |
              The CLI subsystem is the entry point for SonarMark. It must correctly parse all
              supported command-line arguments and route execution to the appropriate handler
              (version, help, validation, or analysis) based on the parsed context.
            children:
              - SonarMark-Cli-Context-Silent
              - SonarMark-Cli-Context-Log
              - SonarMark-Cli-Context-Enforce
              - SonarMark-Cli-Context-Depth
              - SonarMark-Cli-Context-ResultsFile
              - SonarMark-Cli-Context-ResultAlias
              - SonarMark-Cli-Context-Version
              - SonarMark-Cli-Context-Help
              - SonarMark-Cli-Context-Validate
              - SonarMark-Cli-Context-Report
              - SonarMark-Cli-Context-Token
              - SonarMark-Cli-Context-TokenEnv
              - SonarMark-Cli-Context-Server
              - SonarMark-Cli-Context-ProjectKey
              - SonarMark-Cli-Context-Branch
            tests:
              - Cli_VersionDispatch_WithVersionFlag_OutputsVersionString
              - Cli_HelpDispatch_WithHelpFlag_OutputsHelpText
              - Cli_SilentMode_WithSilentFlag_SuppressesOutput
              - Cli_EnforceMode_WithEnforceFlag_SetsEnforceFlag
              - Cli_ArgumentParsing_WithUnknownFlag_ThrowsArgumentException
