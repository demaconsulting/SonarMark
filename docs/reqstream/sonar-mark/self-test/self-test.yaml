---
# SonarMark SelfTest subsystem requirements
sections:
  - title: SonarMark Requirements
    sections:
      - title: SelfTest Requirements
        requirements:
          - id: SonarMark-SelfTest-Orchestrate
            title: The SelfTest subsystem shall verify tool functionality using mock
              data without a live server.
            justification: |
              The SelfTest subsystem must be able to exercise the full analysis and reporting
              pipeline using mock HTTP responses, proving that the tool works correctly in an
              isolated environment without network access.
            children:
              - SonarMark-Validation-Run
              - SonarMark-Validation-Depth
              - SonarMark-Validation-Results
              - SonarMark-Validation-TrxFormat
              - SonarMark-Validation-JUnitFormat
            tests:
              - SelfTest_RunValidation_NullContext_ThrowsArgumentNullException
              - SelfTest_RunValidation_AllTestsPass
              - SelfTest_RunValidation_ProducesResultsFile
              - SelfTest_RunValidation_WithJUnitResultsPath_ProducesJUnitResultsFile
