---
# SonarMark SonarIntegration SonarQubeClient unit requirements
sections:
  - title: SonarMark Requirements
    sections:
      - title: SonarIntegration Requirements
        sections:
          - title: SonarQubeClient Requirements
            requirements:
              - id: SonarMark-Server-QualityGate
                title: The tool shall fetch quality gate status from SonarQube/SonarCloud.
                justification: |
                  Quality gate status indicates whether code meets the defined quality standards and is fundamental
                  to the tool's enforcement capabilities. This information is essential for making pass/fail
                  decisions in CI/CD pipelines and providing visibility into overall code quality.
                tests:
                  - SonarQubeClient_GetQualityResultByBranchAsync_ValidQualityGateResponse_ReturnsQualityGateStatus

              - id: SonarMark-Server-Issues
                title: The tool shall fetch issues from SonarQube/SonarCloud.
                justification: |
                  Issues represent code quality problems identified by Sonar analysis. Fetching and reporting
                  these issues allows developers to understand what needs to be fixed and provides the detailed
                  information needed to improve code quality beyond just pass/fail status.
                tests:
                  - SonarQubeClient_GetQualityResultByBranchAsync_IssuesPaginatedAcrossTwoPages_AccumulatesAllIssues

              - id: SonarMark-Server-HotSpots
                title: The tool shall fetch security hot-spots from SonarQube/SonarCloud.
                justification: |
                  Security hot-spots highlight code that requires security review, helping teams identify and
                  address potential security vulnerabilities. This is critical for maintaining secure applications
                  and meeting security compliance requirements.
                tests:
                  - SonarQubeClient_GetQualityResultByBranchAsync_HotSpotsPaginatedAcrossTwoPages_AccumulatesAllHotSpots

              - id: SonarMark-Server-ProjectName
                title: The tool shall retrieve the project name from SonarQube/SonarCloud.
                justification: |
                  Using the server-side project name in the report header makes reports immediately
                  identifiable without requiring callers to supply display names separately. The API
                  call to /api/components/show provides the canonical name configured in the
                  SonarQube/SonarCloud project, ensuring the displayed name always matches the
                  authoritative project record rather than a caller-supplied string.
                tests:
                  - SonarQubeClient_GetQualityResultByBranchAsync_ValidQualityGateResponse_ReturnsQualityGateStatus

              - id: SonarMark-Server-MetricNames
                title: The tool shall retrieve human-readable metric names from SonarQube/SonarCloud.
                justification: |
                  Metric keys returned by the quality gate API (e.g., new_coverage) are internal
                  identifiers not suitable for display in reports. Fetching the metric name dictionary
                  from /api/metrics/search allows the conditions table to show friendly labels (e.g.,
                  Coverage on New Code) without hardcoding a mapping, keeping the tool compatible with
                  any server configuration or custom metric definitions.
                tests:
                  - SonarQubeClient_GetQualityResultByBranchAsync_ValidMetricsResponse_ReturnsFriendlyMetricNames

              - id: SonarMark-Server-AuthToken
                title: When an authentication token is supplied, the HTTP client shall
                  include a Basic Authorization header on all API requests.
                justification: |
                  SonarQube and SonarCloud use HTTP Basic authentication with the PAT as the username
                  and an empty password. Setting the Authorization header on the shared HttpClient
                  instance ensures every API call within a single analysis run is authenticated
                  consistently, without requiring each call site to manage credentials independently.
                tests:
                  - SonarQubeClient_Constructor_WithToken_SetsAuthorizationHeader
                  - SonarQubeClient_Constructor_WithoutToken_NoAuthorizationHeader

              - id: SonarMark-Server-BranchQuery
                title: When a branch is specified, the HTTP client shall include it
                  as a branch query parameter on all applicable API requests.
                justification: |
                  SonarQube and SonarCloud expose branch-level analysis data through an optional
                  branch query parameter on multiple endpoints. Including the branch parameter on
                  the quality gate, issues, and hot-spots endpoints ensures that results reflect
                  the requested branch rather than the default branch, which is essential for
                  pull-request and feature-branch quality gate workflows.
                tests:
                  - Program_Run_WithBranchFlag_IncludesBranchInServerRequest
