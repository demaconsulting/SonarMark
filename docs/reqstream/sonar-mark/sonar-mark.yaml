---
# SonarMark system-level requirements
sections:
  - title: SonarMark Requirements
    requirements:
      - id: SonarMark-Core-QualityGate
        title: The system shall retrieve quality gate status from SonarQube/SonarCloud
          and include it in the report.
        justification: |
          Quality gate status is the primary outcome of a SonarQube/SonarCloud analysis and the most
          important metric for CI/CD enforcement decisions. Verifying end-to-end retrieval and reporting
          confirms that the CLI, HTTP client, data model, and report renderer all integrate correctly
          to deliver the quality gate result.
          Note: this requirement intentionally combines retrieval and reporting into one statement because
          the combined behavior is the single observable end-to-end outcome that matters for system
          integration; reviewers should not split this into two separate requirements.
        children:
          - SonarMark-SonarIntegration-Orchestrate
          - SonarMark-ReportGeneration-Orchestrate
        tests:
          - SonarMark_QualityGateRetrieval

      - id: SonarMark-Core-Issues
        title: The system shall retrieve issues from SonarQube/SonarCloud and include
          them in the report.
        justification: |
          Issues represent code quality defects identified by Sonar analysis. Verifying end-to-end
          retrieval and reporting confirms that all pagination, data mapping, and rendering components
          integrate correctly to deliver a complete issues list.
          Note: this requirement intentionally combines retrieval and reporting into one statement because
          the combined behavior is the single observable end-to-end outcome that matters for system
          integration; reviewers should not split this into two separate requirements.
        children:
          - SonarMark-SonarIntegration-Orchestrate
          - SonarMark-ReportGeneration-Orchestrate
        tests:
          - SonarMark_IssuesRetrieval

      - id: SonarMark-Core-HotSpots
        title: The system shall retrieve security hot-spots from SonarQube/SonarCloud
          and include them in the report.
        justification: |
          Security hot-spots require manual security review and must be reported separately from
          standard issues. Verifying end-to-end retrieval and reporting confirms that the security
          hot-spot data path through the system integrates correctly from API call to rendered report.
          Note: this requirement intentionally combines retrieval and reporting into one statement because
          the combined behavior is the single observable end-to-end outcome that matters for system
          integration; reviewers should not split this into two separate requirements.
        children:
          - SonarMark-SonarIntegration-Orchestrate
          - SonarMark-ReportGeneration-Orchestrate
        tests:
          - SonarMark_HotSpotsRetrieval

      - id: SonarMark-Core-Report
        title: The system shall generate a complete markdown report combining all
          retrieved analysis data.
        justification: |
          The primary deliverable of SonarMark is a comprehensive markdown report that combines
          quality gate status, issues, and security hot-spots. Verifying this end-to-end confirms
          that all system components - CLI argument handling, server communication, data aggregation,
          and markdown rendering - operate correctly as an integrated whole.
        children:
          - SonarMark-Cli-Orchestrate
          - SonarMark-SonarIntegration-Orchestrate
          - SonarMark-ReportGeneration-Orchestrate
        tests:
          - SonarMark_MarkdownReportGeneration

      - id: SonarMark-Core-Validation
        title: The system shall run self-validation tests and report results when
          --validate is supplied.
        justification: |
          Self-validation mode lets users verify that SonarMark is functioning correctly without
          requiring a live SonarQube/SonarCloud server. Verifying this end-to-end confirms that the
          CLI dispatch, self-test runner, and result reporting all integrate correctly and that the
          shipped binary is fully testable in isolated environments.
        children:
          - SonarMark-SelfTest-Orchestrate
        tests:
          - IntegrationTest_ValidateFlag_OutputsHeaderAndSummary

      - id: SonarMark-Core-Enforce
        title: The system shall return a non-zero exit code when --enforce is supplied
          and the quality gate fails.
        justification: |
          Enforcement mode allows SonarMark to act as a build quality gate in CI/CD pipelines,
          failing the build automatically when the Sonar quality gate status is not passing. Verifying
          this end-to-end confirms that the --enforce flag is correctly parsed, propagated to the
          report generation layer, and results in an appropriate process exit code.
        children:
          - SonarMark-Cli-Orchestrate
          - SonarMark-ReportGeneration-Orchestrate
        tests:
          - IntegrationTest_EnforceFlag_IsAccepted

      - id: SonarMark-Core-Help
        title: The system shall display usage help text when invoked with --help.
        justification: |
          Help text is the primary self-documentation mechanism for command-line tools and reduces
          the learning curve for new users. Verifying this end-to-end confirms that the CLI argument
          is correctly recognized and the Program dispatch writes usage information to the console.
        children:
          - SonarMark-Cli-DisplayHelp
        tests:
          - IntegrationTest_HelpFlag_OutputsUsageInformation

      - id: SonarMark-Core-Version
        title: The system shall display the tool version when invoked with --version.
        justification: |
          Version display allows users and CI pipelines to confirm which release of SonarMark is
          installed, which is critical for troubleshooting, compatibility checking, and audit trails.
          Verifying this end-to-end confirms that the version string is correctly emitted by the full
          system.
        children:
          - SonarMark-Cli-DisplayVersion
        tests:
          - IntegrationTest_VersionFlag_OutputsVersion

      - id: SonarMark-Core-Silent
        title: The system shall suppress console output when invoked with --silent.
        justification: |
          Silent mode is essential for automated scripts and CI environments where console output
          would interfere with log parsing or pipeline tooling. Verifying this end-to-end confirms
          that the flag is correctly parsed and all standard output is suppressed throughout the
          full execution path.
        children:
          - SonarMark-Cli-SilentMode
        tests:
          - IntegrationTest_SilentFlag_SuppressesOutput

      - id: SonarMark-Core-Token
        title: The system shall accept the --token flag to supply an authentication
          token.
        justification: |
          An authentication token is required to access private SonarQube/SonarCloud instances and
          projects. Verifying end-to-end that the flag is accepted without errors confirms that the
          token argument is recognized and does not interfere with subsequent argument processing.
        children:
          - SonarMark-Cli-Context-Token
          - SonarMark-Cli-Context-TokenEnv
        tests:
          - IntegrationTest_TokenParameter_IsAccepted

      - id: SonarMark-Core-Branch
        title: The system shall accept the --branch flag to specify the analysis branch.
        justification: |
          Branch-level analysis is essential for multi-branch development workflows, enabling
          quality gate checks on feature branches and pull requests. Verifying end-to-end that the
          flag is accepted confirms that branch selection is correctly parsed and forwarded.
        children:
          - SonarMark-Cli-Context-Branch
        tests:
          - IntegrationTest_BranchParameter_IsAccepted

      - id: SonarMark-Core-ReportFile
        title: The system shall accept the --report flag to specify the output report
          file path.
        justification: |
          Writing the generated markdown to a named file allows the report to be committed to
          version control or published as a build artifact. Verifying end-to-end that the flag is
          accepted confirms that the report path argument is correctly parsed and does not cause
          an unrecognized-argument error.
        children:
          - SonarMark-Cli-Context-Report
        tests:
          - IntegrationTest_ReportParameter_IsAccepted

      - id: SonarMark-Core-ReportDepth
        title: The system shall accept --depth and --report-depth flags to control
          the markdown heading depth of the generated report, and shall reject invalid
          values with an error.
        justification: |
          The heading depth flag controls how the report integrates into larger documents. Both
          --depth (primary) and --report-depth (deprecated alias) must be accepted. Invalid or
          out-of-range values must produce a clear error message rather than silently generating
          malformed markdown output.
        children:
          - SonarMark-Cli-Context-Depth
        tests:
          - IntegrationTest_ReportDepthWithoutValue_ShowsError
          - IntegrationTest_ReportDepthWithInvalidValue_ShowsError
          - IntegrationTest_ReportDepthWithZero_ShowsError
          - IntegrationTest_DepthWithoutValue_ShowsError
          - IntegrationTest_DepthWithInvalidValue_ShowsError
          - IntegrationTest_DepthWithZero_ShowsError
