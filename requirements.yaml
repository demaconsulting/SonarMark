---
# SonarMark Requirements
#
# This project uses three categories of tests to verify requirements:
#
# 1. Unit Tests - Run locally via "dotnet test"
# 2. Self-Validation Tests - Run locally via "--validate"
# 3. Platform Tests - Run via CI/CD across OS/runtime matrix
#
# NOTE: Running "reqstream --enforce" with only local test results (unit tests
# and local self-validation) is expected to show some unsatisfied requirements.
# Platform-specific requirements require test results from CI/CD runs across
# the full OS and runtime matrix.
#

includes:
  # CLI subsystem
  - docs/reqstream/sonar-mark/cli/cli.yaml
  - docs/reqstream/sonar-mark/cli/context.yaml
  # Program unit (top-level unit, not in a subsystem)
  - docs/reqstream/sonar-mark/program.yaml
  # SonarQube Integration subsystem
  - docs/reqstream/sonar-mark/sonar-integration/sonar-integration.yaml
  - docs/reqstream/sonar-mark/sonar-integration/sonar-qube-client.yaml
  - docs/reqstream/sonar-mark/sonar-integration/sonar-hot-spot.yaml
  - docs/reqstream/sonar-mark/sonar-integration/sonar-issue.yaml
  # Report Generation subsystem
  - docs/reqstream/sonar-mark/report-generation/report-generation.yaml
  - docs/reqstream/sonar-mark/report-generation/sonar-quality-result.yaml
  # SelfTest subsystem
  - docs/reqstream/sonar-mark/self-test/self-test.yaml
  - docs/reqstream/sonar-mark/self-test/validation.yaml
  # System-level requirements
  - docs/reqstream/sonar-mark/sonar-mark.yaml
  # Platform support requirements
  - docs/reqstream/sonar-mark/platform-requirements.yaml
  # OTS software requirements (one per component)
  - docs/reqstream/ots/mstest.yaml
  - docs/reqstream/ots/reqstream.yaml
  - docs/reqstream/ots/buildmark.yaml
  - docs/reqstream/ots/versionmark.yaml
  - docs/reqstream/ots/sarifmark.yaml
  - docs/reqstream/ots/reviewmark.yaml
  - docs/reqstream/ots/pandoc.yaml
  - docs/reqstream/ots/weasyprint.yaml
  - docs/reqstream/ots/fileassert.yaml
