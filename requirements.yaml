---
# SonarMark Requirements
#
# This project uses three categories of tests to verify requirements:
#
# 1. Unit Tests - Run locally via "dotnet test"
# 2. Self-Validation Tests - Run locally via "--validate"
# 3. Platform Tests - Run via CI/CD across OS/runtime matrix
#
# NOTE: Running "reqstream --enforce" with only local test results (unit tests
# and local self-validation) is expected to show some unsatisfied requirements.
# Platform-specific requirements require test results from CI/CD runs across
# the full OS and runtime matrix.
#

includes:
  # CLI subsystem
  - docs/reqstream/context-requirements.yaml
  - docs/reqstream/program-requirements.yaml
  # SonarQube Integration subsystem
  - docs/reqstream/sonar-qube-client-requirements.yaml
  - docs/reqstream/sonar-hot-spot-requirements.yaml
  - docs/reqstream/sonar-issue-requirements.yaml
  # Report Generation subsystem
  - docs/reqstream/sonar-quality-result-requirements.yaml
  # Validation subsystem
  - docs/reqstream/validation-requirements.yaml
  # System-level requirements
  - docs/reqstream/system-requirements.yaml
  # Extra: platform and OTS software
  - docs/reqstream/platform-requirements.yaml
  - docs/reqstream/ots-requirements.yaml
