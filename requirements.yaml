---
# SonarMark Requirements
#
# This project uses three categories of tests to verify requirements:
#
# 1. Unit Tests - Run locally via "dotnet test"
# 2. Self-Validation Tests - Run locally via "--validate"
# 3. Platform Tests - Run via CI/CD across OS/runtime matrix
#
# NOTE: Running "reqstream --enforce" with only local test results (unit tests
# and local self-validation) is expected to show some unsatisfied requirements.
# Platform-specific requirements require test results from CI/CD runs across
# the full OS and runtime matrix.
#

includes:
  # CLI subsystem
  - docs/reqstream/sonar-mark/cli/subsystem-cli.yaml
  - docs/reqstream/sonar-mark/cli/unit-context.yaml
  # Program unit (top-level unit, not in a subsystem)
  - docs/reqstream/sonar-mark/unit-program.yaml
  # SonarQube Integration subsystem
  - docs/reqstream/sonar-mark/sonar-integration/subsystem-sonar-integration.yaml
  - docs/reqstream/sonar-mark/sonar-integration/unit-sonar-qube-client.yaml
  - docs/reqstream/sonar-mark/sonar-integration/unit-sonar-hot-spot.yaml
  - docs/reqstream/sonar-mark/sonar-integration/unit-sonar-issue.yaml
  # Report Generation subsystem
  - docs/reqstream/sonar-mark/report-generation/subsystem-report-generation.yaml
  - docs/reqstream/sonar-mark/report-generation/unit-sonar-quality-result.yaml
  # SelfTest subsystem
  - docs/reqstream/sonar-mark/self-test/subsystem-self-test.yaml
  - docs/reqstream/sonar-mark/self-test/unit-validation.yaml
  # System-level requirements
  - docs/reqstream/sonar-mark/sonar-mark.yaml
  # Platform support requirements
  - docs/reqstream/sonar-mark/platform-requirements.yaml
  # OTS software requirements (one per component)
  - docs/reqstream/ots/ots-mstest.yaml
  - docs/reqstream/ots/ots-reqstream.yaml
  - docs/reqstream/ots/ots-buildmark.yaml
  - docs/reqstream/ots/ots-versionmark.yaml
  - docs/reqstream/ots/ots-sarifmark.yaml
