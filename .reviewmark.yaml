---
# ReviewMark Configuration File
# This file defines which files require review, where the evidence store is located,
# and how files are grouped into named review-sets following software unit boundaries.

# Patterns identifying all files that require review.
# Processed in order; prefix a pattern with '!' to exclude.
needs-review:
  - "requirements.yaml"            # Root requirements manifest
  - "docs/reqstream/**/*.yaml"    # All requirements files
  - "docs/design/**/*.md"         # All design documents
  - "README.md"                   # Root level README
  - "docs/user_guide/**/*.md"     # User guide
  - "**/*.cs"                     # All C# source and test files
  - "!**/obj/**"                  # Exclude build output
  - "!**/bin/**"                  # Exclude build output

# Evidence source: review data and index.json are located in the 'reviews' branch
# of this repository, accessed through the GitHub public HTTPS raw content access.
# Note: The 'reviews' branch must be created and populated with review evidence PDFs
# and an index.json before enforcement (--enforce flag) can be enabled in the pipeline.
evidence-source:
  type: url
  location: https://raw.githubusercontent.com/demaconsulting/SonarMark/reviews/index.json

# Review sets grouping files by logical unit of review.
# Each review-set groups requirements, design, source, and tests for a coherent software unit
# so that an AI-assisted review can verify consistency across the full evidence chain.
reviews:
  # Software unit reviews — one per class
  - id: SonarMark-Cli-Context
    title: Review of SonarMark Context Unit
    paths:
      - "docs/reqstream/sonar-mark/cli/unit-context.yaml"
      - "docs/design/sonar-mark/cli/context.md"
      - "src/**/Context.cs"
      - "test/**/ContextTests.cs"

  - id: SonarMark-Program
    title: Review of SonarMark Program Unit
    paths:
      - "docs/reqstream/sonar-mark/unit-program.yaml"
      - "docs/design/sonar-mark/program.md"
      - "src/**/Program.cs"
      - "test/**/ProgramTests.cs"

  - id: SonarMark-SelfTest-Validation
    title: Review of SonarMark Validation Unit
    paths:
      - "docs/reqstream/sonar-mark/self-test/unit-validation.yaml"
      - "docs/design/sonar-mark/self-test/validation.md"
      - "src/**/Validation.cs"
      - "test/**/ValidationTests.cs"

  - id: SonarMark-SonarIntegration-SonarHotSpot
    title: Review of SonarMark SonarHotSpot Unit
    paths:
      - "docs/reqstream/sonar-mark/sonar-integration/unit-sonar-hot-spot.yaml"
      - "docs/design/sonar-mark/sonar-integration/sonar-hot-spot.md"
      - "src/**/SonarHotSpot.cs"
      - "test/**/SonarHotSpotTests.cs"

  - id: SonarMark-SonarIntegration-SonarIssue
    title: Review of SonarMark SonarIssue Unit
    paths:
      - "docs/reqstream/sonar-mark/sonar-integration/unit-sonar-issue.yaml"
      - "docs/design/sonar-mark/sonar-integration/sonar-issue.md"
      - "src/**/SonarIssue.cs"
      - "test/**/SonarIssueTests.cs"

  - id: SonarMark-ReportGeneration-SonarQualityResult
    title: Review of SonarMark SonarQualityResult Unit
    paths:
      - "docs/reqstream/sonar-mark/report-generation/unit-sonar-quality-result.yaml"
      - "docs/design/sonar-mark/report-generation/sonar-quality-result.md"
      - "src/**/SonarQualityResult.cs"
      - "test/**/SonarQualityResultTests.cs"

  - id: SonarMark-SonarIntegration-SonarQubeClient
    title: Review of SonarMark SonarQubeClient Unit
    paths:
      - "docs/reqstream/sonar-mark/sonar-integration/unit-sonar-qube-client.yaml"
      - "docs/design/sonar-mark/sonar-integration/sonar-qube-client.md"
      - "src/**/SonarQubeClient.cs"
      - "test/**/SonarQubeClientTests.cs"

  # Subsystem reviews — cross-cutting subsystems spanning multiple units
  - id: SonarMark-Cli
    title: Review of SonarMark CLI Subsystem
    paths:
      - "docs/reqstream/sonar-mark/cli/subsystem-cli.yaml"
      - "docs/reqstream/sonar-mark/cli/unit-context.yaml"
      - "docs/reqstream/sonar-mark/unit-program.yaml"
      - "docs/design/sonar-mark/cli/cli.md"
      - "docs/design/sonar-mark/cli/context.md"
      - "docs/design/sonar-mark/program.md"
      - "src/**/Context.cs"
      - "src/**/Program.cs"
      - "test/**/ContextTests.cs"
      - "test/**/ProgramTests.cs"

  - id: SonarMark-SonarIntegration
    title: Review of SonarMark SonarQube Integration Subsystem
    paths:
      - "docs/reqstream/sonar-mark/sonar-integration/subsystem-sonar-integration.yaml"
      - "docs/reqstream/sonar-mark/sonar-integration/unit-sonar-qube-client.yaml"
      - "docs/reqstream/sonar-mark/sonar-integration/unit-sonar-hot-spot.yaml"
      - "docs/reqstream/sonar-mark/sonar-integration/unit-sonar-issue.yaml"
      - "docs/design/sonar-mark/sonar-integration/sonar-integration.md"
      - "docs/design/sonar-mark/sonar-integration/sonar-qube-client.md"
      - "docs/design/sonar-mark/sonar-integration/sonar-hot-spot.md"
      - "docs/design/sonar-mark/sonar-integration/sonar-issue.md"
      - "src/**/SonarQubeClient.cs"
      - "src/**/SonarHotSpot.cs"
      - "src/**/SonarIssue.cs"
      - "test/**/SonarQubeClientTests.cs"
      - "test/**/SonarHotSpotTests.cs"
      - "test/**/SonarIssueTests.cs"

  - id: SonarMark-ReportGeneration
    title: Review of SonarMark Report Generation Subsystem
    paths:
      - "docs/reqstream/sonar-mark/report-generation/subsystem-report-generation.yaml"
      - "docs/reqstream/sonar-mark/report-generation/unit-sonar-quality-result.yaml"
      - "docs/design/sonar-mark/report-generation/report-generation.md"
      - "docs/design/sonar-mark/report-generation/sonar-quality-result.md"
      - "src/**/SonarQualityResult.cs"
      - "test/**/SonarQualityResultTests.cs"

  - id: SonarMark-SelfTest
    title: Review of SonarMark SelfTest Subsystem
    paths:
      - "docs/reqstream/sonar-mark/self-test/subsystem-self-test.yaml"
      - "docs/reqstream/sonar-mark/self-test/unit-validation.yaml"
      - "docs/design/sonar-mark/self-test/self-test.md"
      - "docs/design/sonar-mark/self-test/validation.md"
      - "src/**/Validation.cs"
      - "test/**/ValidationTests.cs"

  # System review — end-to-end integrated system and platform support
  - id: SonarMark-Architecture
    title: Review of SonarMark Integrated System
    paths:
      - "docs/reqstream/sonar-mark/sonar-mark.yaml"
      - "docs/reqstream/sonar-mark/platform-requirements.yaml"
      - "docs/reqstream/ots/ots-mstest.yaml"
      - "docs/reqstream/ots/ots-reqstream.yaml"
      - "docs/reqstream/ots/ots-buildmark.yaml"
      - "docs/reqstream/ots/ots-versionmark.yaml"
      - "docs/reqstream/ots/ots-sarifmark.yaml"
      - "docs/design/introduction.md"
      - "docs/design/sonar-mark/sonar-mark.md"
      - "test/**/IntegrationTests.cs"
      - "test/**/Runner.cs"
      - "test/**/AssemblyInfo.cs"

  # Requirements review — all requirements files
  - id: SonarMark-AllRequirements
    title: Review of SonarMark Requirements
    paths:
      - "requirements.yaml"
      - "docs/reqstream/**/*.yaml"

  # Design review — system requirements against all design documentation
  - id: SonarMark-Design
    title: Review of SonarMark Design
    paths:
      - "docs/reqstream/sonar-mark/sonar-mark.yaml"
      - "docs/design/**/*.md"
