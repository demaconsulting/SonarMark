---
# Spell-Checking
#
# PURPOSE:
# - Maintain professional documentation and code quality
# - Catch spelling errors before publication
# - Support consistent technical terminology usage
# - Misspelled words should be fixed in the source
# - NEVER add a misspelled word to the 'words' list
# - PROPOSE only genuine technical terms/names as needed

version: "0.2"
language: en

# Project-specific technical terms and tool names
words:
  - buildmark
  - BuildMark
  - buildtransitive
  - CodeQL
  - contentfiles
  - copilot
  - cspell
  - csproj
  - csharpsquid
  - dbproj
  - dcterms
  - Dema
  - demaconsulting
  - DEMACONSULTINGNUGETKEY
  - Dependabot
  - dependabot
  - doctitle
  - docversion
  - dotnet
  - dotnettool
  - editorconfig
  - fileassert
  - finalizer
  - fsproj
  - gitattributes
  - hotspots
  - LINQ
  - markdownlint
  - mstest
  - myterm
  - xunit
  - Xunit
  - ncipollo
  - nuget
  - nupkg
  - opencover
  - pagetitle
  - pandoc
  - pandoctool
  - qualitygates
  - reqstream
  - ReqStream
  - reviewmark
  - ReviewMark
  - sarif
  - SARIF
  - sarifmark
  - Sarif
  - SarifMark
  - SBOM
  - semver
  - snupkg
  - Postconditions
  - Sonar
  - SonarCloud
  - SonarMark
  - SonarQube
  - qube
  - sonarscanner
  - spdx
  - spdxtool
  - sysml
  - sysml2tools
  - SysML2Tools
  - testname
  - trx
  - vbproj
  - vcxproj
  - versionmark
  - VersionMark
  - Weasyprint
  - weasyprinttool
  - yamlfix
  - yamllint

# Exclude common build artifacts, dependencies, and vendored third-party code
ignorePaths:
  - "**/.git/**"
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/thirdparty/**"
  - "**/third-party/**"
  - "**/3rd-party/**"
  - "**/AGENT_REPORT_*.md"
  - "**/.agent-logs/**"
  - "**/bin/**"
  - "**/obj/**"
  - "**/generated/**"
  - package-lock.json
